{% extends "layouts/base.html" %}

{% block content %}
<h1>Сайт: {{ url.name }}</h1>

<div class="table-responsive">
    <table class="table table-bordered table-hover mt-3" data-test="url">
        <tbody>
            <tr>
                <td>ID</td>
                <td>{{ url.id }}</td>
            </tr>
            <tr>
                <td>Имя</td>
                <td>{{ url.name }}</td>
            </tr>
            <tr>
                <td>Дата создания</td>
                <td>{{ url.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</td>
            </tr>
        </tbody>
    </table>
</div>
{% endblock %}

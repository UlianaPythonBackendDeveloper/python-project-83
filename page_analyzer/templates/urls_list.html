{% extends "layouts/base.html" %}

{% block content %}
<h1 class="mb-4">Сайты</h1>

<div class="table-responsive">
    <table class="table table-bordered table-hover" data-test="urls">
        <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Имя</th>
                <th>Дата создания</th>
            </tr>
        </thead>
        <tbody>
            {% for url in urls %}
            <tr>
                <td>{{ url.id }}</td>
                <td>
                    <a href="{{ url_for('get_url', id=url.id) }}">{{ url.name }}</a>
                </td>
                <td>{{ url.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
